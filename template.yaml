  ######### Storage
  #########

  RawBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: raw-bucket

  OutputBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: output-bucket

  UrlsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: urlsQueue
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt UrlsDLQ.Arn
        maxReceiveCount: 3

  UrlsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: urlsDLQ

  RunTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: PipelineRun
      AttributeDefinitions:
        - AttributeName: runId
          AttributeType: S
      KeySchema:
        - AttributeName: runId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  CompletedTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: CompletedRoadmaps
      AttributeDefinitions:
        - AttributeName: runId
          AttributeType: S
        - AttributeName: roadmapName
          AttributeType: S
      KeySchema:
        - AttributeName: runId
          KeyType: HASH
        - AttributeName: roadmapName
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
  SyncStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: SyncState
      AttributeDefinitions:
        - AttributeName: roadmapName
          AttributeType: S
      KeySchema:
        - AttributeName: roadmapName
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  ######## LOGGING :
  ########


  ETLStateMachineLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      RetentionInDays: 30

  NestLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${NestLambdalith}
      RetentionInDays: 30

  # ExtractFunctionLogGroup:
  #   Type: AWS::Logs::LogGroup
  #   Properties:
  #     LogGroupName: !Sub "/aws/lambda/${ExtractFunction}"
  #     RetentionInDays: 30

  TransformFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${TransformFunction}
      RetentionInDays: 30

  LoadFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${LoadFunction}
      RetentionInDays: 30

Outputs:
  ApiUrl:
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/
  LocalApiUrl:
    Value: !Sub http://localhost:4566/_aws/execute-api/${ServerlessRestApi}/Prod/