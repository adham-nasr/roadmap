  TransformFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: transformService
      Runtime: provided.al2023
      Handler: bootstrap
      CodeUri: etl/
      Timeout: 600
      Policies:
        # --- First Bucket Permissions ---
        - S3ReadPolicy:
            BucketName: output-bucket
        - S3WritePolicy:
            BucketName: output-bucket

        # --- Second Bucket Permissions ---
        - S3ReadPolicy:
            BucketName: raw-bucket
        - S3WritePolicy:
            BucketName: raw-bucket
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref EtlEventBus

      Environment:
        Variables:
          # STATE_BUCKET: state-bucket
          OUTPUT_BUCKET: output-bucket
          STATE_FILE_KEY: sync/state.json
          IDS_FILE_KEY: sync/roadmap_ids.json
          ROADMAPS_OUTPUT_KEY: output/roadmaps.json
          TOPICS_OUTPUT_KEY: output/topics.json
          GITHUB_OWNER: nilbuild
          GITHUB_REPO: developer-roadmap
          GITHUB_BRANCH: master
          GITHUB_ROADMAPS_PATH: src/data/roadmaps
          GITHUB_TOKEN: ''
          EVENT_BUS_NAME: !Ref EtlEventBus
      Tracing: Active

    Metadata:
      BuildMethod: makefile

  LoadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: loadService
      Runtime: provided.al2023
      Handler: bootstrap
      CodeUri: etl/
      Timeout: 600
      Policies:
        - S3ReadPolicy:
            BucketName: output-bucket
        - S3WritePolicy:
            BucketName: output-bucket
      Environment:
        Variables:
          MONGODB_URI: mongodb+srv://adham2042000_db_user:jVe446ugr2gngmKS@cluster0.gho62ke.mongodb.net/?appName=Cluster0
          MONGODB_DB: roadmapsdb
      Tracing: Active

    Metadata:
      BuildMethod: makefile

  ###### Orchestrators
  ######

  EtlEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: etl-bus

  TransformTriggerRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EtlEventBus
      EventPattern:
        source:
          - etl.pipeline
        detail-type:
          - RunComplete
      State: ENABLED
      Targets:
        - Arn: !GetAtt TransformFunction.Arn
          Id: TransformFunction
  LoadTriggerRule:
    Type: AWS::Events::Rule
    Properties:
      EventBusName: !Ref EtlEventBus
      EventPattern:
        source:
          - etl.pipeline
        detail-type:
          - TransformComplete
      State: ENABLED
      Targets:
        - Arn: !GetAtt LoadFunction.Arn
          Id: LoadFunction

  InvokeTranformLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TransformFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt TransformTriggerRule.Arn

  InvokeLoadLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LoadFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt LoadTriggerRule.Arn
