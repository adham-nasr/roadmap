AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Globals:
  Function:
    Timeout: 30
    MemorySize: 512

Resources:
  NestLambdalith:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nest-lambdalith
      Runtime: nodejs22.x
      Handler: dist/main.handler
      CodeUri: roadmap/
      Events:
        ProxyApi:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
        RootApi:
          Type: Api
          Properties:
            Path: /
            Method: ANY
      Tracing: Active

  #### FUNCTIONS :


  FetchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: fetchService
      Runtime: provided.al2023
      Handler: bootstrap
      CodeUri: etl/
      Timeout: 600
      Environment:
        Variables:
          RAW_BUCKET: raw-bucket
          STATE_FILE_KEY: sync/state.json
          IDS_FILE_KEY: sync/roadmap_ids.json
          GITHUB_OWNER: nilbuild
          GITHUB_REPO: developer-roadmap
          GITHUB_BRANCH: master
          GITHUB_ROADMAPS_PATH: src/data/roadmaps
          GITHUB_TOKEN: ''
          SQS_QUEUE_URL: !Ref UrlsQueue
          RUN_TABLE: !Ref RunTable
          COMPLETED_TABLE: !Ref CompletedTable
      Tracing: Active

      Policies:
        - SQSSendMessagePolicy:
            QueueName: !GetAtt UrlsQueue.QueueName
        - DynamoDBWritePolicy:
            TableName: !Ref RunTable
        - DynamoDBReadPolicy:
            TableName: !Ref RunTable
        - DynamoDBWritePolicy:
            TableName: !Ref CompletedTable
        - DynamoDBReadPolicy:
            TableName: !Ref CompletedTable
      Events:
        MyTimer:
          Type: Schedule
          Properties:
            Schedule: rate(20 minutes)
    Metadata:
      BuildMethod: makefile

  DownloadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: downloadService
      Runtime: provided.al2023
      Handler: bootstrap
      CodeUri: etl/
      Timeout: 600
      Environment:
        Variables:
          RAW_BUCKET: raw-bucket
          STATE_KEY_PREFIX: sync/
          STATE_FILE_KEY: sync/state.json
          IDS_FILE_KEY: sync/roadmap_ids.json
          GITHUB_OWNER: nilbuild
          GITHUB_REPO: developer-roadmap
          GITHUB_BRANCH: master
          GITHUB_ROADMAPS_PATH: src/data/roadmaps
          GITHUB_TOKEN: ''
          RUN_TABLE: !Ref RunTable
          COMPLETED_TABLE: !Ref CompletedTable
          EVENT_BUS_NAME: !Ref EtlEventBus
      Tracing: Active

      Policies:
        - SQSPollerPolicy:
            QueueName: !GetAtt UrlsQueue.QueueName
        - DynamoDBWritePolicy:
            TableName: !Ref SyncStateTable
        - DynamoDBReadPolicy:
            TableName: !Ref SyncStateTable
        - DynamoDBWritePolicy:
            TableName: !Ref RunTable
        - DynamoDBReadPolicy:
            TableName: !Ref RunTable
        - DynamoDBWritePolicy:
            TableName: !Ref CompletedTable
        - DynamoDBReadPolicy:
            TableName: !Ref CompletedTable
        - S3CrudPolicy:
            BucketName: !Ref RawBucket
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref EtlEventBus
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt UrlsQueue.Arn
            BatchSize: 5
    Metadata:
      BuildMethod: makefile

